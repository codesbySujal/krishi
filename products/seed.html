<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .main {
            width: 100%;
            height: 100vh;
            background-color: rgba(222, 222, 222, 0.194);
            color: black;
        }

        .header1 {
            width: 100%;
            height: 10%;
            background-color: rgba(0, 128, 0, 0);
            display: flex;
        }

        .shop-logo {
            width: 10%;
            height: 100%;
            /* background-color: yellow; */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo {
            width: 70px;
            height: 70px;
            background-color: lightblue;
            border-radius: 100px;
        }

        .shop-name {
            width: 30%;
            height: 100%;
            /* background-color: lightcoral; */
            font-size: 35px;
            /* padding-left: 30px; */
            align-content: center;
            /* color: white; */
        }

        .nav1 {
            width: 60%;
            height: 100%;
            /* background-color: lightgrey; */
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            font-size: 20px;
        }

        a {
            text-decoration: none;
            color: black;

        }

        .seed-pack {
            width: 100%;
            height: 90%;
            background-color: white;
            display: grid;
            justify-items: center;
            align-items: center;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
        }

        .pack {
            width: 150px;
            height: 150px;
            background-color: rgba(128, 128, 128, 0.159);
            border-radius: 100px;
        }

        @media (max-width:477px){

            .main{
                height: auto;
            }
            .shop-logo{
                width: 20%;
            }
            .shop-name{
                font-size: 15px;
                width: 20%;
                text-align: center;
                height: auto;
            }

            .nav1{
                font-size: 13px;
                height: auto;
            }

            .pack{
                width: 100px;
                height: 100px;
                
            }
            .seed-pack{ 
            
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-rows: 150px 150px 150px 150px 150px 150px;
               
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <header class="header1">
            <div class="shop-logo">
                <div class="logo"><img style="border-radius: 100px;" src="assets/image/logo.png" alt="" width="100%"
                        height="100%"></div>
            </div>
            <div class="shop-name">The Agro</div>
            <nav class="nav1">
                <a href="">Home</a>
                <a href="#about">About</a>
                <a href="">Service</a>
                <a href="">Product</a>
                <a href="">Contact</a>
            </nav>
        </header>
        <div class="seed-pack">
            <div class="pack"></div>
            <div class="pack"></div>
            <div class="pack"></div>
            <div class="pack"></div>
            <div class="pack"></div>
            <div class="pack"></div>

            <div class="pack"></div>
            <div class="pack"></div>
            <div class="pack"></div>
            <div class="pack"></div>
            <div class="pack"></div>
            <div class="pack"></div>

            <div class="pack"></div>
            <div class="pack"></div>
            <div class="pack"></div>
            <div class="pack"></div>
            <div class="pack"></div>
            <div class="pack"></div>
        </div>
    </div>
</body>

</html>
